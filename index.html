<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LIGA Consultoria Licitatória | Especialistas em Licitações Públicas</title>
    <meta
      name="description"
      content="Consultoria especializada em licitações públicas, pregões eletrônicos, contratos administrativos e estratégia empresarial para atuação no mercado público."
    />
    <meta property="og:title" content="LIGA Consultoria Licitatória | Especialistas em Licitações Públicas" />
    <meta
      property="og:description"
      content="Consultoria especializada em licitações públicas, pregões eletrônicos e contratos administrativos. Mais de 30 anos de experiência."
    />
    <meta property="og:type" content="website" />
    <meta name="twitter:card" content="summary" />
    <script>
      // Restore path redirected by 404.html
      (function () {
        var p = window.location.search.slice(1).split('&').filter(function (s) { return s.startsWith('p='); })[0];
        if (p) {
          var q = window.location.search.slice(1).split('&').filter(function (s) { return s.startsWith('q='); })[0];
          window.history.replaceState(
            null, null,
            window.location.pathname +
            (p.slice(2) ? '/' + p.slice(2).replace(/~and~/g, '&') : '') +
            (q ? '?' + q.slice(2).replace(/~and~/g, '&') : '') +
            window.location.hash
          );
        }
      }());
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Inter:wght@300;400;500;600;700&display=swap"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
